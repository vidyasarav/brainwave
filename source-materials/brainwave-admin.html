function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){return JSON.parse(s)}}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_DATA))}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch(e){}}

function App(){
const[data,setDataRaw]=useState(()=>loadData());
const[page,setPage]=useState('dash');
const[toast,setToast]=useState('');
const[selWs,setSelWs]=useState('spring-2026');

const setData=(fn)=>{
setDataRaw(prev=>{
const next=typeof fn==='function'?fn(prev):fn;
saveData(next);
return next;
});
};

const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

const update=(path,value)=>{
setData(prev=>{
const next=JSON.parse(JSON.stringify(prev));
const keys=path.split('.');
let obj=next;
for(let i=0;i<keys.length-1;i++){const k=isNaN(keys[i])?keys[i]:parseInt(keys[i]);obj=obj[k]}
const last=isNaN(keys[keys.length-1])?keys[keys.length-1]:parseInt(keys[keys.length-1]);
obj[last]=value;
return next;
});
};

const handleSave=()=>{saveData(data);showToast('All changes saved!')};

const handlePublish=()=>{
const pubData=JSON.parse(JSON.stringify(data));
delete pubData.benchmarking;
delete pubData.actionItems;
const blob=new Blob([JSON.stringify(pubData,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='brainwave-public-data.json';a.click();
URL.revokeObjectURL(url);
showToast('Public site data exported (no benchmarking or action items)');
};

const handleReset=()=>{if(confirm('Reset all data to defaults? This cannot be undone.')){setDataRaw(JSON.parse(JSON.stringify(DEFAULT_DATA)));saveData(DEFAULT_DATA);showToast('Data reset to defaults')}};

const teamNames=data.team.map(t=>t.name.split(',')[0]);

return(
<div className="flex h-screen">
{toast&&<div className="save-toast">{toast}</div>}

{n.id==='bench'&&<span className="ml-auto text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded">INTERNAL</span>}
</button>
))}
</nav>
<div className="p-3 border-t border-gray-700 space-y-2">
<button onClick={handleSave} className="w-full flex items-center justify-center gap-2 py-2 px-3 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-xs"><Ic name="save"/>Save All Changes</button>
<button onClick={handlePublish} className="pubtn w-full flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-white font-medium text-xs"><Ic name="pub"/>Publish Public Site</button>

const items=(data.actionItems[selWs]||[]);
const[filter,setFilter]=useState('all');
const filtered=filter==='all'?items:items.filter(a=>a.priority===filter||a.status===filter);

const toggle=(idx)=>{
setData(p=>{const n=JSON.parse(JSON.stringify(p));const arr=n.actionItems[selWs];arr[idx].status=arr[idx].status==='pending'?'done':'pending';return n});

setData(p=>{const n=JSON.parse(JSON.stringify(p));if(!n.actionItems[selWs])n.actionItems[selWs]=[];n.actionItems[selWs].push({id:Date.now(),task:'New action item',status:'pending',priority:'medium',category:'General',assignee:'',deadline:''});return n});
};
const rm=(idx)=>{
setData(p=>{const n=JSON.parse(JSON.stringify(p));n.actionItems[selWs].splice(idx,1);return n});
};
const upd=(idx,key,val)=>{
setData(p=>{const n=JSON.parse(JSON.stringify(p));n.actionItems[selWs][idx][key]=val;return n});
};
const categories=[...new Set(items.map(a=>a.category)),'General','Logistics','Staffing','Technology','Budget','Registration','Evaluation','Curriculum','Materials','Outreach','Accreditation','Speakers','Documentation','Funding'];
const uniqueCats=[...new Set(categories)];

return(<div>

</select>
</div>
<div className="flex gap-1.5 mb-4 flex-wrap">
{['all','pending','done','high','medium','low'].map(f=>(
<button key={f} onClick={()=>setFilter(f)} className={`px-3 py-1 rounded-full text-xs font-medium border ${filter===f?'bg-purple-600 text-white border-purple-600':'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
))}
</div>

{filtered.map((a,i)=>{
const realIdx=items.indexOf(a);
const isOverdue=a.status==='pending'&&a.deadline&&new Date(a.deadline)<new Date();
return(
<div key={a.id} className={`card flex items-start gap-3 py-3 group ${a.status==='done'?'opacity-50':''} ${isOverdue?'border-red-300 bg-red-50/30':''}`}>
<button onClick={()=>toggle(realIdx)} className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-1 ${a.status==='done'?'bg-green-500 border-green-500 text-white':'border-gray-300 hover:border-purple-400'}`}>
{a.status==='done'&&<Ic name="check"/>}
</button>
<div className="flex-1 space-y-1.5">
<input className={`ei text-sm ${a.status==='done'?'line-through text-gray-400':''}`} value={a.task} onChange={e=>upd(realIdx,'task',e.target.value)}/>
<div className="flex gap-2 flex-wrap">
<select className="es text-[11px]" value={a.priority} onChange={e=>upd(realIdx,'priority',e.target.value)}>
<option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
</select>
<select className="es text-[11px]" value={a.category} onChange={e=>upd(realIdx,'category',e.target.value)}>
{uniqueCats.map(c=><option key={c} value={c}>{c}</option>)}
</select>
<div className="flex items-center gap-1">
<span className="text-[10px] text-gray-400">Assignee:</span>
<select className="es text-[11px]" value={a.assignee||''} onChange={e=>upd(realIdx,'assignee',e.target.value)}>
<option value="">Unassigned</option>
{teamNames.map(n=><option key={n} value={n}>{n}</option>)}
</select>
</div>
<div className="flex items-center gap-1">
<span className="text-[10px] text-gray-400">Deadline:</span>
<input type="date" className="es text-[11px]" value={a.deadline||''} onChange={e=>upd(realIdx,'deadline',e.target.value)}/>
{isOverdue&&<span className="text-[10px] text-red-600 font-bold">OVERDUE</span>}
</div>
</div>
</div>
<button onClick={()=>rm(realIdx)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 mt-1"><Ic name="trash"/></button>
</div>
)})}
</div>
<button onClick={add} className="flex items-center gap-1.5 text-purple-600 hover:text-purple-800 text-sm font-medium mt-3"><Ic name="plus"/>Add Action Item</button>
</div>);
}

// ── Timeline ──
function Timeline({data,selWs,setSelWs}){
const wsOptions=data.workshops.map(w=>({id:w.id,title:w.title}));
const items=(data.actionItems[selWs]||[]).filter(a=>a.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
const today=new Date();
const months={};
items.forEach(a=>{const d=new Date(a.deadline);const k=d.toLocaleString('default',{month:'long',year:'numeric'});if(!months[k])months[k]=[];months[k].push(a)});

return(<div>
<h1 className="text-2xl font-bold mb-1">Pre-Workshop Timeline</h1>
<p className="text-gray-500 text-sm mb-4">Visual timeline of tasks leading up to the workshop.</p>
<div className="flex items-center gap-3 mb-6">
<label className="text-sm font-medium text-gray-700">Workshop:</label>
<select className="es text-sm" value={selWs} onChange={e=>setSelWs(e.target.value)}>
{wsOptions.map(w=><option key={w.id} value={w.id}>{w.title}</option>)}
</select>
</div>
<div className="flex gap-3 mb-6">
<div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-purple-600"></div><span className="text-xs text-gray-500">Done</span></div>
<div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full border-2 border-purple-600"></div><span className="text-xs text-gray-500">Pending</span></div>
<div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full border-2 border-red-500 bg-red-50"></div><span className="text-xs text-gray-500">Overdue</span></div>
</div>
{Object.entries(months).map(([month,tasks])=>(
<div key={month} className="mb-8">
<div className="text-sm font-bold text-purple-700 mb-3 flex items-center gap-2">
<div className="w-8 h-8 rounded-lg bg-purple-100 flex items-center justify-center text-purple-700 text-xs font-bold">
{month.split(' ')[0].slice(0,3)}
</div>
{month}
</div>
<div className="relative pl-10 space-y-3">
<div className="tl-line"></div>
{tasks.map((a,i)=>{
const isOverdue=a.status==='pending'&&new Date(a.deadline)<today;
const isDone=a.status==='done';
return(
<div key={a.id} className="relative">
<div className={`tl-dot ${isDone?'done':''} ${isOverdue?'overdue':''}`} style={{top:12}}></div>
<div className={`card ml-4 py-3 ${isOverdue?'border-red-200 bg-red-50/50':''} ${isDone?'opacity-60':''}`}>
<div className="flex items-start justify-between">
<div>
<div className={`text-sm font-medium ${isDone?'line-through text-gray-400':''}`}>{a.task}</div>
<div className="flex gap-2 mt-1 flex-wrap">
<span className={`sb ${a.priority==='high'?'ph':a.priority==='medium'?'pm':'pl'}`}>{a.priority}</span>
<span className="sb bg-gray-100 text-gray-600">{a.category}</span>
{a.assignee&&<span className="text-[11px] text-purple-600 font-medium">{a.assignee}</span>}
</div>
</div>
<div className="text-right flex-shrink-0 ml-3">
<div className={`text-xs font-semibold ${isOverdue?'text-red-600':isDone?'text-green-600':'text-gray-500'}`}>
{new Date(a.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
</div>
{isOverdue&&<div className="text-[10px] text-red-500 font-bold">OVERDUE</div>}
{isDone&&<div className="text-[10px] text-green-500 font-bold">DONE</div>}
</div>
</div>
</div>
</div>
)})}
</div>
</div>
))}
{items.length===0&&<p className="text-gray-400 text-sm">No items with deadlines set for this workshop.</p>}
</div>);
}

// ── Testimonials ──
function Testimonials({data,setData}){
const add=()=>setData(p=>({...p,testimonials:[...p.testimonials,'']}));
const rm=(i)=>setData(p=>({...p,testimonials:p.testimonials.filter((_,j)=>j!==i)}));
const upd=(i,v)=>setData(p=>{const t=[...p.testimonials];t[i]=v;return{...p,testimonials:t}});
return(<div>
<h1 className="text-2xl font-bold mb-1">Teacher Testimonials</h1>
<p className="text-gray-500 text-sm mb-6">Manage teacher feedback and quotes.</p>
{data.testimonials.map((t,i)=>(
<div key={i} className="card group">
<div className="flex gap-3">
<div className="text-3xl text-purple-300">"</div>
<textarea className="eta flex-1 text-sm italic" value={t} onChange={e=>upd(i,e.target.value)}/>
<button onClick={()=>rm(i)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600"><Ic name="trash"/></button>
</div>
</div>
))}
<button onClick={add} className="flex items-center gap-1.5 text-purple-600 hover:text-purple-800 text-sm font-medium mt-2"><Ic name="plus"/>Add Testimonial</button>
</div>);
}

// ── Forms ──
function Forms({data,update}){
return(<div>
<h1 className="text-2xl font-bold mb-1">Forms & Links</h1>
<p className="text-gray-500 text-sm mb-6">Manage registration and interest form URLs.</p>
<div className="card">
<h3 className="font-semibold mb-3">Teacher Participation Form</h3>
<p className="text-xs text-gray-500 mb-2">For K-12 teachers interested in attending workshops.</p>
<input className="ei" value={data.forms.teacherParticipation} onChange={e=>update('forms.teacherParticipation',e.target.value)} placeholder="https://docs.google.com/forms/..."/>
</div>
<div className="card">
<h3 className="font-semibold mb-3">Instructor Interest Form</h3>
<p className="text-xs text-gray-500 mb-2">For UCLA postdocs interested in becoming BRAINWAVE instructors.</p>
<input className="ei" value={data.forms.instructorInterest} onChange={e=>update('forms.instructorInterest',e.target.value)} placeholder="https://docs.google.com/forms/..."/>
</div>
</div>);
}

// ── Benchmarking (Admin only) ──
function Bench({data,update}){
return(<div>
<h1 className="text-2xl font-bold mb-1">Research & Benchmarking <span className="sb bg-amber-100 text-amber-700 ml-2 text-xs">INTERNAL ONLY</span></h1>
<p className="text-gray-500 text-sm mb-6">How other universities run workshops. This section is NOT published to the public site.</p>
{data.benchmarking.map((b,bi)=>(
<div key={bi} className="card">
<input className="ei font-semibold mb-1" value={b.program} onChange={e=>update(`benchmarking.${bi}.program`,e.target.value)}/>
<input className="ei text-sm text-gray-500 mb-3" value={b.university} onChange={e=>update(`benchmarking.${bi}.university`,e.target.value)}/>
<div className="grid grid-cols-2 gap-4">
<div>
<label className="text-xs font-semibold text-gray-400 block mb-1">Key Strengths</label>
{b.strengths.map((s,si)=>(
<div key={si} className="flex items-center gap-1 mb-1">
<span className="text-green-500 text-xs">&#10003;</span>
<input className="ei flex-1 text-xs" value={s} onChange={e=>{const n=[...b.strengths];n[si]=e.target.value;update(`benchmarking.${bi}.strengths`,n)}}/>
</div>
))}
</div>
<div>
<label className="text-xs font-semibold text-gray-400 block mb-1">Improvement Idea</label>
<textarea className="eta text-xs" value={b.improvementIdea} onChange={e=>update(`benchmarking.${bi}.improvementIdea`,e.target.value)}/>
</div>
</div>
</div>
))}
</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
